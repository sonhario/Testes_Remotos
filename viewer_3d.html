<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Antes/Depois — Eldorado, JF</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #eee; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; }
  #canvas { width: 100vw; height: 100vh; display: block; }

  #header {
    position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
    text-align: center; z-index: 10;
    background: rgba(0,0,0,0.75); padding: 10px 20px; border-radius: 20px;
    backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
    max-width: 90vw;
  }
  #header h1 { font-size: 0.9rem; font-weight: 400; letter-spacing: 0.05em; }
  #header p { font-size: 0.65rem; color: #888; margin-top: 4px; }

  #loading {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    text-align: center; z-index: 20;
  }
  #loading .spinner {
    width: 40px; height: 40px; border: 3px solid #333; border-top-color: #4fc3f7;
    border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { font-size: 0.8rem; color: #888; }
  #progress { font-size: 0.7rem; color: #555; margin-top: 6px; }

  #controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 10;
  }

  #toggle-container {
    display: flex; gap: 0; border-radius: 25px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
  }

  .toggle-btn {
    padding: 10px 24px; border: none; cursor: pointer;
    font-size: 0.8rem; letter-spacing: 0.05em;
    background: rgba(0,0,0,0.6); color: #888;
    transition: all 0.3s;
  }
  .toggle-btn.active {
    background: rgba(79, 195, 247, 0.3); color: #fff;
  }
  .toggle-btn:last-child.active {
    background: rgba(239, 83, 80, 0.3); color: #fff;
  }

  #info {
    background: rgba(0,0,0,0.6); padding: 6px 14px; border-radius: 15px;
    font-size: 0.65rem; color: #666; text-align: center;
    backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08);
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Carregando modelos 3D...</p>
  <p id="progress">Terreno pr&eacute;...</p>
</div>

<div id="header">
  <h1>Rua Dr. Sebasti&atilde;o de Andrade, Eldorado</h1>
  <p>Arraste para girar &bull; Scroll/pinch para zoom &bull; Toque nos bot&otilde;es abaixo</p>
</div>

<canvas id="canvas"></canvas>

<div id="controls">
  <div id="toggle-container">
    <button class="toggle-btn active" id="btnPre" onclick="showPre()">Antes</button>
    <button class="toggle-btn" id="btnPost" onclick="showPost()">Depois</button>
  </div>
  <div id="info">
    Google 3D Tiles (pr&eacute;) &bull; ODM DSM 5cm (p&oacute;s) &bull; 91 edifica&ccedil;&otilde;es detectadas
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

const canvas = document.getElementById('canvas');
const loadingEl = document.getElementById('loading');
const progressEl = document.getElementById('progress');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 5000);
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxDistance = 2000;
controls.minDistance = 5;

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const sun = new THREE.DirectionalLight(0xffeedd, 1.5);
sun.position.set(200, 400, 100);
scene.add(sun);
const fill = new THREE.DirectionalLight(0x8899cc, 0.4);
fill.position.set(-100, 200, -200);
scene.add(fill);
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x362d1b, 0.3));

let preModel = null;
let postModel = null;
let modelsLoaded = 0;

const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/libs/draco/');
const loader = new GLTFLoader();
loader.setDRACOLoader(dracoLoader);

function onModelLoaded(model, label) {
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  model.position.sub(center);

  modelsLoaded++;
  console.log(`${label}: ${size.x.toFixed(0)}x${size.y.toFixed(0)}x${size.z.toFixed(0)}m`);

  if (modelsLoaded === 2) {
    loadingEl.style.display = 'none';
    // Camera
    const maxDim = Math.max(size.x, size.y, size.z);
    camera.position.set(maxDim * 0.4, maxDim * 0.5, maxDim * 0.6);
    controls.target.set(0, 0, 0);
    controls.update();
  }
}

// Load PRE model (Google 3D Tiles)
progressEl.textContent = 'Terreno pré (Google)...';
loader.load(
  'pre_deslizamento/modelo_pre_completo.glb',
  (gltf) => {
    preModel = gltf.scene;
    scene.add(preModel);
    onModelLoaded(preModel, 'PRE');
    progressEl.textContent = 'Terreno pós (drone)...';

    // Load POST model after PRE
    loader.load(
      'pre_deslizamento/modelo_pos_odm.glb',
      (gltf) => {
        postModel = gltf.scene;
        postModel.visible = false;
        scene.add(postModel);
        onModelLoaded(postModel, 'POST');
      },
      (p) => { if (p.total > 0) progressEl.textContent = `Pós: ${Math.round(p.loaded/p.total*100)}%`; },
      (e) => { console.error('POST error:', e); progressEl.textContent = 'Erro no modelo pós'; }
    );
  },
  (p) => { if (p.total > 0) progressEl.textContent = `Pré: ${Math.round(p.loaded/p.total*100)}%`; },
  (e) => { console.error('PRE error:', e); progressEl.textContent = 'Erro no modelo pré'; }
);

// Toggle functions
window.showPre = () => {
  if (preModel) preModel.visible = true;
  if (postModel) postModel.visible = false;
  document.getElementById('btnPre').classList.add('active');
  document.getElementById('btnPost').classList.remove('active');
};

window.showPost = () => {
  if (preModel) preModel.visible = false;
  if (postModel) postModel.visible = true;
  document.getElementById('btnPost').classList.add('active');
  document.getElementById('btnPre').classList.remove('active');
};

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
